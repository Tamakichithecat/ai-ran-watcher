name: Daily AI RAN Digest

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 22:00 UTC = 翌7:00 JST
  workflow_dispatch:         # 手動実行ボタン（テスト用）

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:   ${{ secrets.SLACK_CHANNEL_ID }}
          CLAUDE_PROJECT_URL: ${{ secrets.CLAUDE_PROJECT_URL }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python collector.py

      - name: Commit digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.md seen_urls.json
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
